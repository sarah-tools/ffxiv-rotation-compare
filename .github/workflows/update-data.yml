name: Update Rotation Data
on:
  schedule:
    # JST 10:00 = UTC 1:00 — runs daily, script determines odd/even day
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      day_mode:
        description: 'Day mode (odd/even/all)'
        required: false
        default: 'auto'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Determine day mode
        id: day
        run: |
          INPUT_MODE="${{ github.event.inputs.day_mode || 'auto' }}"
          if [ "$INPUT_MODE" = "auto" ]; then
            DAY_OF_MONTH=$(date -u +%-d)
            if [ $((DAY_OF_MONTH % 2)) -eq 1 ]; then
              echo "mode=odd" >> $GITHUB_OUTPUT
            else
              echo "mode=even" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
          fi
          echo "Day mode: $(cat $GITHUB_OUTPUT)"

      - name: Fetch rotation data
        env:
          FFLOGS_CLIENT_ID: ${{ secrets.FFLOGS_CLIENT_ID }}
          FFLOGS_CLIENT_SECRET: ${{ secrets.FFLOGS_CLIENT_SECRET }}
        run: |
          MODE="${{ steps.day.outputs.mode }}"
          if [ "$MODE" = "all" ]; then
            npm run fetch-data
          else
            npm run fetch-data -- --day "$MODE"
          fi

      - name: Commit and push if data changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes"
          else
            git commit -m "Update rotation data (${{ steps.day.outputs.mode }} day)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build site
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
